services:
  oglasnadeska-src:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oglasnadeska-src
    hostname: oglasnadeska-src
    cap_add:
      - NET_ADMIN
    security_opt:
      - label=disable
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "41641:41641/udp"
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY_PERSONAL}
      - TS_USERSPACE=false
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_HOSTNAME=${TS_HOSTNAME_PERSONAL:-oglasnadeska-server}
      - PROXY_TARGET=172.20.0.3
    volumes:
      - personal-data:/var/lib/tailscale
    networks:
      ts-bridge:
        ipv4_address: 172.20.0.2
    restart: unless-stopped

  oglasnadeska-dst:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oglasnadeska-dst
    hostname: oglasnadeska-dst
    cap_add:
      - NET_ADMIN
    security_opt:
      - label=disable
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "41642:41641/udp"
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY_WORK}
      - TS_USERSPACE=false
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_HOSTNAME=${TS_HOSTNAME_WORK:-jaka-bridge}
      - TS_DEST_IP=${TARGET_IP}
      - TS_TAILSCALED_EXTRA_ARGS=--port=41641
    volumes:
      - work-data:/var/lib/tailscale
    networks:
      ts-bridge:
        ipv4_address: 172.20.0.3
    restart: unless-stopped

networks:
  ts-bridge:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  personal-data:
  work-data:
